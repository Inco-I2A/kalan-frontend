                  "margin": "20px"

                  "body-rg": ["Inter"],
                  "label-sm": ["Inter"],

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .tactile-button {
      box-shadow: 0 4px 0 0 rgba(0, 0, 0, 0.1);
    }
    .tactile-button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 0 rgba(0, 0, 0, 0.1);
    }
    .primary-shadow {
      box-shadow: 0 4px 0 0 #2f2ebe;
    }
    .secondary-shadow {
      box-shadow: 0 4px 0 0 #653e00;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-rg text-body-rg min-h-screen flex flex-col">
<!-- Suppression of Navigation Shell as per 'Linear/Transactional' rule -->
<main class="flex-grow flex flex-col items-center justify-center px-margin py-xl">
<!-- Hero Branding Section -->
<div class="w-full max-w-md text-center mb-xl">
<div class="inline-flex items-center justify-center p-md bg-primary-container rounded-[24px] mb-lg shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-[40px] text-on-primary" data-icon="auto_stories" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface mb-xs">Bon retour !</h1>
<p class="font-body-rg text-body-rg text-on-surface-variant">Connecte-toi pour retrouver tes flashcards.</p>
</div>
<!-- Login Form Card -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-[32px] p-xl shadow-[0_8px_30px_rgb(99,102,241,0.08)] border border-surface-container-high">
<form class="space-y-lg">
<!-- Email Field -->
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-xs flex items-center gap-base">
<span class="material-symbols-outlined text-[18px]" data-icon="mail">mail</span>
            Email
          </label>
<input class="w-full h-[56px] px-lg rounded-xl border-outline-variant bg-surface-container-low focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline/50" placeholder="ton@email.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-base">
<div class="flex justify-between items-center ml-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-base">
<span class="material-symbols-outlined text-[18px]" data-icon="lock">lock</span>
              Mot de passe
            </label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Mot de passe oublié ?</a>
</div>
<div class="relative">
<input class="w-full h-[56px] px-lg rounded-xl border-outline-variant bg-surface-container-low focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline/50" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-[60px] bg-primary-container text-on-primary font-title-md text-title-md rounded-[20px] primary-shadow tactile-button transition-all flex items-center justify-center gap-md" type="submit">
          Se connecter
          <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-xl flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="mx-md font-label-sm text-label-sm text-outline">OU</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-md">
<button class="h-[56px] bg-surface-container-high rounded-xl flex items-center justify-center hover:bg-surface-variant transition-colors tactile-button border border-transparent">
<img alt="Google" class="w-6 h-6 mr-sm" data-alt="Official Google G logo in bright colors on white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgAXYs9QF8QvAQGDOnJefRvtR_vDUBb91C2kABricbAHaXhbGJ8p4IjO-FNBtO0oat0ukWaxR-M3vT6ZIUM8Dgm2BDy1lBDt5VqLtJR3KYfgunb5z8xnsjlLjIT_RW8wXI9vq_FeBNav5mC1D2cMDPcbMx3MWuFl433rJT9WYrE1gIrn30y-mv6py3G6Doj-gn1HZwzOibJD5mPYqIjDiSh7Az0NgpEzjtb5ALk7SLAhwDkOCtxCZ74gpHnn7s9jP1Uk2F3Z62ofQ"/>
<span class="font-label-sm text-label-sm text-on-surface">Google</span>
</button>
<button class="h-[56px] bg-on-surface text-surface rounded-xl flex items-center justify-center hover:opacity-90 transition-opacity tactile-button">
<span class="material-symbols-outlined text-[24px] mr-sm" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="font-label-sm text-label-sm">Apple</span>
</button>
</div>
</div>
<!-- Bottom Link -->
<div class="mt-xl text-center">
<p class="font-body-rg text-body-rg text-on-surface-variant">
        Pas de compte ? 
        <a class="text-primary font-bold hover:underline" href="#">S'inscrire</a>
</p>
</div>
<!-- Decorative Illustration Background (Abstract) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-40">
<div class="absolute top-[10%] right-[5%] w-64 h-64 bg-secondary-container/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-[10%] left-[5%] w-80 h-80 bg-primary-container/10 rounded-full blur-3xl"></div>
</div>
<!-- Offline Indicator as per guidelines -->
<div class="fixed top-md right-md z-50 flex items-center gap-sm bg-blue-500/10 text-blue-600 px-md py-xs rounded-full border border-blue-500/20 backdrop-blur-sm">
<span class="material-symbols-outlined text-[18px]" data-icon="wifi">wifi</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Online</span>
</div>
</main>
<!-- Illustration for Desktop (Hidden on Mobile) -->
<div class="hidden lg:flex fixed right-0 top-0 bottom-0 w-[40%] bg-surface-container-low items-center justify-center p-xl overflow-hidden">
<div class="relative w-full max-w-lg aspect-square">
<div class="absolute inset-0 bg-primary-container rounded-[40px] rotate-3 opacity-10"></div>
<div class="absolute inset-0 bg-secondary-container rounded-[40px] -rotate-3 opacity-10"></div>
<div class="relative h-full w-full bg-white rounded-[40px] shadow-2xl flex flex-col items-center justify-center p-xl text-center border border-white">
<img class="w-48 h-48 rounded-[32px] mb-lg object-cover shadow-lg" data-alt="Stylized composition of colorful books and learning materials in a bright, modern studio setting with soft shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAClqBEQDDa_CW-eqJsN-6G5h-NfzAs3VbxBR14As8RWAt_45F1GGHTQI3EimltQ-8tC45wp0iOUUXW06sUU6WaguClGwwh-E5LgHt9DQUGISpwVLDY06l8cGaTGCyhNJZsYxx9-3ReTkoqdIYdpPCCDPEpoYSDhbAinYjnMEsZeIy-fulTP945eumEZkL7cn_pqyzgnHSD63gkwYzlzF2X8nhquM8Lj3d0u3h3hg23obntMnk1Ygt-19Cwsxr9QIheFPhLjALKs2M"/>
<h2 class="font-display-lg text-display-lg text-on-surface mb-md">Prêt pour tes défis ?</h2>
<p class="font-body-rg text-body-rg text-on-surface-variant px-xl">Mémorise plus vite, joue plus souvent et gagne des trophées avec tes amis sur FlashLearn.</p>
<div class="mt-xl flex gap-md">
<div class="bg-tertiary-fixed text-on-tertiary-fixed px-lg py-sm rounded-full flex items-center gap-sm">
<span class="material-symbols-outlined" data-icon="emoji_events" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
<span class="font-label-sm">Top 10% Aujourd'hui</span>
</div>
</div>
</div>
</div>
</div>
</body></html>
