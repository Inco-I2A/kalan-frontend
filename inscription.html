<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-slate-50 dark:bg-slate-950 border-b border-slate-200 dark:border-slate-800 shadow-sm shadow-indigo-100/10 dark:shadow-none docked full-width top-0 sticky z-50">
<div class="flex justify-between items-center w-full px-5 py-3 max-w-full">
<div class="flex items-center gap-3">
<button class="active:scale-95 transition-transform duration-150 hover:bg-slate-100 dark:hover:bg-slate-900 p-2 rounded-full">
<span class="material-symbols-outlined text-indigo-600 dark:text-indigo-400">arrow_back</span>
</button>
<span class="text-xl font-black text-indigo-600 dark:text-indigo-400 tracking-tight">EduPlay</span>
</div>
<div class="flex items-center">
<div class="bg-blue-500/10 text-blue-600 px-3 py-1 rounded-full flex items-center gap-1.5 font-label-sm text-label-sm">
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span>Online</span>
</div>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-margin">
<div class="w-full max-w-md">
<!-- Hero Illustration / Brand Element -->
<div class="mb-xl text-center">
<div class="inline-block p-4 rounded-[32px] bg-primary-container mb-md">
<span class="material-symbols-outlined text-[48px] text-on-primary-container" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface mb-xs">Crée ton compte</h1>
<p class="font-body-rg text-body-rg text-on-surface-variant">Rejoins la communauté FlashLearn.</p>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest rounded-[24px] p-lg shadow-[0_8px_30px_rgb(99,102,241,0.08)] border border-outline-variant/30">
<form class="space-y-md">
<!-- Name Input -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">Nom complet</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface-container-low border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="Jean Dupont" type="text"/>
</div>
</div>
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface-container-low border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="jean@exemple.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">Mot de passe</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full h-[56px] pl-12 pr-12 bg-surface-container-low border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-[56px] bg-primary text-on-primary font-title-md text-title-md rounded-xl tactile-button primary-shadow active:translate-y-1 transition-all mt-lg flex items-center justify-center gap-2" type="submit">
                        S'inscrire
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-xl text-center">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant"></div></div>
<span class="relative bg-surface-container-lowest px-4 text-label-sm font-label-sm text-outline">ou s'inscrire avec</span>
</div>
<!-- Social Options -->
<div class="grid grid-cols-2 gap-md">
<button class="h-[52px] flex items-center justify-center gap-2 border-2 border-outline-variant rounded-xl hover:bg-surface-container-high transition-colors font-label-sm text-label-sm active:scale-95 duration-150">
<img alt="Google logo" class="w-5 h-5" data-alt="Official Google G logo icon with signature red, yellow, green and blue colors on white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAHxt5_2AoETcTQtdnravGU2IYjFzxBZyfMttU2_Em0CWEXwZfu6iIB5_3may4mjksklcTcXX5CR07mOSuayMyWdrTnzc-Tkf-5BD0C57eLnSQVV8ITs-as_ipZEV92sjvdEminNORxQS7vLl2XiQOaVeAcOjvbuQ8FfK2JOLVLNA8KQLk0YafhK3ZaGdQtMevUblzGjF8FNNXFOOy5thuAvVjqRrf9I6Pwc4mn_ykPQK0WD4Zxg_JlCmNcaBhF4bBTAXF1rbRxcd8"/>
                        Google
                    </button>
<button class="h-[52px] flex items-center justify-center gap-2 border-2 border-outline-variant rounded-xl hover:bg-surface-container-high transition-colors font-label-sm text-label-sm active:scale-95 duration-150">
<span class="material-symbols-outlined text-[#1877F2]" style="font-variation-settings: 'FILL' 1;">social_leaderboard</span>
                        Facebook
                    </button>
</div>
</div>
<!-- Bottom Link -->
<div class="mt-lg text-center">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors inline-flex items-center gap-1 group" href="#">
                    Déjà un compte ? <span class="text-primary font-bold group-hover:underline">Se connecter</span>
</a>
</div>
</div>
</main>
<!-- Footer Decorative Element -->
<div class="fixed bottom-0 left-0 right-0 h-48 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -bottom-24 -left-24 w-64 h-64 rounded-full bg-secondary-container/10 blur-3xl"></div>
<div class="absolute -bottom-12 -right-12 w-48 h-48 rounded-full bg-primary-container/10 blur-3xl"></div>
</div>
<!-- BottomNavBar (Suppressed as per rules for Transactional/Login screens) -->
<!-- The BottomNavBar is intentionally excluded to prioritize focus on the registration journey. -->
</body></html>
